<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>評価結果</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', sans-serif; background: #f9f6f2; color: #333; padding: 20px; max-width: 700px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #eee; }
    .card h2 { font-size: 16px; font-weight: bold; margin-bottom: 16px; color: #5c3d1e; }
    .info-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid #f0e8de; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; }
    .info-value { font-weight: bold; color: #333; }
    .category-block { padding: 16px 0; border-bottom: 1px solid #f0e8de; }
    .category-block:last-child { border-bottom: none; }
    .category-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .category-name { font-size: 14px; font-weight: bold; color: #5c3d1e; flex: 1; }
    .category-score { font-size: 13px; color: #888; margin-right: 12px; }
    .ref-badge { background: #fff8f3; border: 1px solid #f0e8de; border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: bold; color: #5c3d1e; margin-right: 8px; }
    .rank-btns { display: flex; gap: 6px; }
    .rank-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #ddd; background: white; font-size: 13px; font-weight: bold; cursor: pointer; color: #5c3d1e; }
    .rank-btn.selected { background: #5c3d1e; color: white; border-color: #5c3d1e; }
    .reason-input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; margin-top: 8px; }
    .total-section { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
    .total-btn { width: 56px; height: 56px; border-radius: 50%; border: 2px solid #ddd; background: white; font-size: 18px; font-weight: bold; cursor: pointer; color: #5c3d1e; }
    .total-btn.selected { background: #5c3d1e; color: white; border-color: #5c3d1e; }
    .btn-primary { background: #5c3d1e; color: white; border: none; border-radius: 50px; padding: 14px 32px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>評価結果</h1>
  <p class="subtitle">参考評価を参考に、評価者が最終評価を決定してください。</p>

  <div class="card">
    <h2>面談情報</h2>
    <div class="info-row"><span class="info-label">院</span><span class="info-value" id="clinic-name">-</span></div>
    <div class="info-row"><span class="info-label">スタッフ</span><span class="info-value" id="staff-name">-</span></div>
    <div class="info-row"><span class="info-label">評価者</span><span class="info-value" id="evaluator-name">-</span></div>
    <div class="info-row"><span class="info-label">総合スコア</span><span class="info-value" id="checklist-score">-</span></div>
  </div>

  <div class="card">
    <h2>📊 カテゴリ別評価</h2>
    <p style="font-size:13px; color:#888; margin-bottom:16px;">参考評価を参考に、各カテゴリの評価と理由を入力してください</p>
    <div id="category-list"></div>
  </div>

  <div class="card">
    <h2>総合評価</h2>
    <p style="font-size:13px; color:#888; margin-bottom:12px;">全カテゴリを踏まえた最終評価を選んでください</p>
    <div class="total-section">
      <button class="total-btn" onclick="selectTotal('S')">S</button>
      <button class="total-btn" onclick="selectTotal('A')">A</button>
      <button class="total-btn" onclick="selectTotal('B')">B</button>
      <button class="total-btn" onclick="selectTotal('C')">C</button>
      <button class="total-btn" onclick="selectTotal('D')">D</button>
    </div>
    <p id="selected-total" style="text-align:center; margin-top:12px; font-size:14px; color:#7a5c3a; font-weight:bold;"></p>
    <textarea id="manager-comment" rows="3" placeholder="総合コメントを入力（任意）" style="width:100%; margin-top:12px; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px;"></textarea>
    <button class="btn-primary" id="saveBtn" onclick="saveResult()" disabled>この評価を保存する</button>
  </div>

  <script>
    // ★ URLの代わりにlocalStorageから取得
    const saved = JSON.parse(localStorage.getItem('evalData') || '{}');
    const clinic = saved.clinic || '-';
    const staff = saved.staff || '-';
    const evaluator = saved.evaluator || '-';
    const score = saved.score || '0';
    const maxScore = saved.max || '41';
    const transcript = saved.transcript || '';
    const memo = saved.memo || '';
    const checklistDetail = saved.checklistDetail || '';
    const categoryScores = (saved.categoryScores || '0,0,0,0,0,0').split(',').map(Number);

    document.getElementById('clinic-name').textContent = clinic;
    document.getElementById('staff-name').textContent = staff;
    document.getElementById('evaluator-name').textContent = evaluator;
    document.getElementById('checklist-score').textContent = score + '/' + maxScore;

    const categories = [
      { name: '01 素直', max: 6 },
      { name: '02 行動スピード', max: 6 },
      { name: '03 振り返り・前進', max: 6 },
      { name: '04 継続・挑戦', max: 6 },
      { name: '05 キッカケづくり', max: 6 },
      { name: '06 凡事徹底', max: 7 },
    ];

    const managerRanks = {};
    let selectedTotal = '';

    function getAutoRank(checked, max) {
      if (checked === max) return 'S';
      if (checked >= max - 1) return 'A';
      if (checked >= Math.ceil(max / 2)) return 'B';
      return 'C';
    }

    function selectCategoryRank(index, rank) {
      managerRanks[index] = rank;
      document.querySelectorAll(`.rank-btn[data-index="${index}"]`).forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.rank === rank);
      });
      checkAllSelected();
    }

    function selectTotal(rank) {
      selectedTotal = rank;
      document.querySelectorAll('.total-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.textContent === rank);
      });
      document.getElementById('selected-total').textContent = '選択中：' + rank + '評価';
      checkAllSelected();
    }

    function checkAllSelected() {
      const allSelected = Object.keys(managerRanks).length === categories.length && selectedTotal;
      document.getElementById('saveBtn').disabled = !allSelected;
    }

    const list = document.getElementById('category-list');
    categories.forEach((cat, i) => {
      const checked = categoryScores[i] || 0;
      const autoRank = getAutoRank(checked, cat.max);
      const block = document.createElement('div');
      block.className = 'category-block';
      block.innerHTML = `
        <div class="category-header">
          <span class="category-name">${cat.name}</span>
          <span class="category-score">${checked}/${cat.max}</span>
          <span class="ref-badge">参考: ${autoRank}</span>
          <div class="rank-btns">
            ${['S','A','B','C'].map(r => `
              <button class="rank-btn" data-index="${i}" data-rank="${r}" onclick="selectCategoryRank(${i}, '${r}')">${r}</button>
            `).join('')}
          </div>
        </div>
        <input type="text" class="reason-input" id="reason-${i}" placeholder="評価理由を入力してください（任意）">
      `;
      list.appendChild(block);
    });

    async function saveResult() {
      const comment = document.getElementById('manager-comment').value;
      const categoryRanks = categories.map((_, i) => managerRanks[i] || '-').join(',');
      const categoryReasons = categories.map((_, i) => {
        return document.getElementById('reason-' + i).value || '';
      }).join('|');

      const data = {
        clinic, staff, evaluator,
        transcript, memo, checklistDetail,
        categoryRanks,
        categoryReasons,
        totalRank: selectedTotal,
        totalComment: comment
      };

      document.getElementById('saveBtn').textContent = '保存中...';
      document.getElementById('saveBtn').disabled = true;

      try {
        await fetch('https://script.google.com/macros/s/AKfycbz26ZmnrB2O9kVIndBALlOA2uCEvs1NyVF4J7IbxGazlX4hiEgeHPAfpcW4skpbpXMkNw/exec', {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(data)
        });
        // 保存後にlocalStorageをクリア
        localStorage.removeItem('evalData');
        alert('保存しました！Googleドライブとスプレッドシートをご確認ください。');
        window.location.href = 'index.html';
      } catch (err) {
        alert('保存に失敗しました：' + err.message);
      } finally {
        document.getElementById('saveBtn').textContent = 'この評価を保存する';
        document.getElementById('saveBtn').disabled = false;
      }
    }
  </script>
</body>
</html>
