<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI評価結果</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', sans-serif; background: #f9f6f2; color: #333; padding: 20px; max-width: 700px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #eee; }
    .card h2 { font-size: 16px; font-weight: bold; margin-bottom: 16px; color: #5c3d1e; }
    .ai-comment { background: #fff8f3; border-left: 4px solid #7a5c3a; padding: 16px; border-radius: 8px; font-size: 14px; line-height: 1.8; margin-bottom: 16px; }
    .ai-rank { font-size: 48px; font-weight: bold; color: #5c3d1e; text-align: center; padding: 16px; }
    .rank-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
    .rank-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ddd; background: white; font-size: 20px; font-weight: bold; cursor: pointer; color: #5c3d1e; }
    .rank-btn.selected { background: #5c3d1e; color: white; border-color: #5c3d1e; }
    .btn-primary { background: #5c3d1e; color: white; border: none; border-radius: 50px; padding: 14px 32px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .loading { text-align: center; color: #7a5c3a; font-size: 14px; padding: 20px; }
    .info-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid #f0e8de; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; }
    .info-value { font-weight: bold; color: #333; }
  </style>
</head>
<body>
  <h1>AI評価結果</h1>
  <p class="subtitle">AIによる評価提案をもとに、上司が最終評価を決定してください。</p>

  <div class="card">
    <h2>面談情報</h2>
    <div class="info-row">
      <span class="info-label">院</span>
      <span class="info-value" id="clinic-name">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">スタッフ</span>
      <span class="info-value" id="staff-name">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">チェックリストスコア</span>
      <span class="info-value" id="checklist-score">-</span>
    </div>
  </div>

  <div class="card">
    <h2>🤖 AIによる評価提案</h2>
    <div id="ai-loading" class="loading">AIが評価を生成中...</div>
    <div id="ai-result" style="display:none;">
      <div class="ai-rank" id="ai-rank">-</div>
      <div class="ai-comment" id="ai-comment"></div>
    </div>
  </div>

  <div class="card">
    <h2>👤 上司による最終評価</h2>
    <p style="font-size:13px; color:#888; margin-bottom:12px;">AIの提案を参考に最終評価を選んでください</p>
    <div class="rank-buttons">
      <button class="rank-btn" onclick="selectRank('S')">S</button>
      <button class="rank-btn" onclick="selectRank('A')">A</button>
      <button class="rank-btn" onclick="selectRank('B')">B</button>
      <button class="rank-btn" onclick="selectRank('C')">C</button>
      <button class="rank-btn" onclick="selectRank('D')">D</button>
    </div>
    <p id="selected-rank" style="text-align:center; margin-top:12px; font-size:14px; color:#7a5c3a; font-weight:bold;"></p>
    <textarea id="manager-comment" rows="3" placeholder="コメントを入力（任意）" style="width:100%; margin-top:12px; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px;"></textarea>
    <button class="btn-primary" id="saveBtn" onclick="saveResult()" disabled>この評価を保存する</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const clinic = params.get('clinic') || '-';
    const staff = params.get('staff') || '-';
    const score = params.get('score') || '0';
    const maxScore = params.get('max') || '41';
    const transcript = params.get('transcript') || '';
    const memo = params.get('memo') || '';

    document.getElementById('clinic-name').textContent = clinic;
    document.getElementById('staff-name').textContent = staff;
    document.getElementById('checklist-score').textContent = score + '/' + maxScore;

    let selectedRank = '';

    function selectRank(rank) {
      selectedRank = rank;
      document.querySelectorAll('.rank-btn').forEach(btn => btn.classList.remove('selected'));
      event.target.classList.add('selected');
      document.getElementById('selected-rank').textContent = '選択中：' + rank + '評価';
      document.getElementById('saveBtn').disabled = false;
    }

    async function saveResult() {
      const comment = document.getElementById('manager-comment').value;
      const aiRank = document.getElementById('ai-rank').textContent.replace('評価', '').trim();

      const data = {
        clinic, staff,
        date: new Date().toLocaleDateString('ja-JP'),
        score: score + '/' + maxScore,
        aiRank, managerRank: selectedRank,
        managerComment: comment, transcript, memo
      };

      document.getElementById('saveBtn').textContent = '保存中...';
      document.getElementById('saveBtn').disabled = true;

      try {
        await fetch('https://script.google.com/macros/s/AKfycbyHx3GrQ5T5B2vCQ6G8BJCHNTJFUAcn3FGtZn4qkAi-T3LrUGEXtCTGJVhZqv9XTbQq/exec', {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(data)
        });
        alert('保存しました！Googleドライブをご確認ください。');
      } catch (err) {
        alert('保存に失敗しました：' + err.message);
      } finally {
        document.getElementById('saveBtn').textContent = 'この評価を保存する';
        document.getElementById('saveBtn').disabled = false;
      }
    }

    async function generateAIEvaluation() {
      const prompt = `あなたは美容クリニックのスタッフ評価の専門家です。以下の情報をもとに、スタッフの評価をしてください。

スタッフ名：${staff}
チェックリストスコア：${score}/${maxScore}
面談メモ：${memo}
面談の文字起こし：${transcript}

以下の形式で回答してください：
1行目：S/A/B/C/Dのいずれか1文字のみ
2行目以降：200字以内で評価コメント（良い点・課題・次回への期待を含める）`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await response.json();
        const text = data.content[0].text;
        const lines = text.trim().split('\n');
        const rank = lines[0].trim();
        const comment = lines.slice(1).join('\n').trim();
        document.getElementById('ai-loading').style.display = 'none';
        document.getElementById('ai-result').style.display = 'block';
        document.getElementById('ai-rank').textContent = rank + '評価';
        document.getElementById('ai-comment').textContent = comment;
      } catch (err) {
        document.getElementById('ai-loading').textContent = 'AI評価の生成に失敗しました。手動で評価を選んでください。';
      }
    }

    generateAIEvaluation();
  </script>
</body>
</html>
